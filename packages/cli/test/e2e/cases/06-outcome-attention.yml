    - run: { select: 0, classification: unknown }

- id: outcome-attention-independent-of-classification
  covers: [ANTMAY-FR-0006.AC-0607]
  title: Pending bundles are reported as attention regardless of run classification
  description: >-
    A terminal (done) run's active thread carries a non-empty pending-decisions
    and pending-reviews workspace; status reports the thread as needing human
    attention with the bundle counts, independently of the done classification.
  threads: [260718155545z-demo]
  control: { paneAlive: true }
  files:
    - { path: docs/threads/260718155545z-demo/.pending-decisions/d1.md, content: "decision\n" }
    - { path: docs/threads/260718155545z-demo/.pending-reviews/r1.md, content: "review\n" }
  seedRuns:
    - { id: run-attn, thread: 260718155545z-demo, skill: propose, harness: claude, classification: done, sessionKind: pinned, sessionId: s-attn, handle: attn-pane }
  steps:
    - argv: [status]
      expect:
        exitCode: 0
        stdoutContains:
          - "[done]"
          - "Attention:"
          - "260718155545z-demo"
          - "pending decisions: 1"
          - "pending reviews:   1"
  assertState:
    - registryRunCount: 1
    - run: { select: 0, classification: done }
