        stdoutContains: ["[unknown]"]
        stdoutNotContains: ["[done]", "[blocked]", "[refused]"]
  assertState:
    - registryRunCount: 1
    - run: { select: 0, classification: unknown }

- id: outcome-malformed-additive-and-fork
  covers: [ANTMAY-FR-0006.AC-0604]
  title: Malformed lines are skipped, additive fields tolerated, and forks followed
  description: >-
    One seeded transcript interleaves non-JSON malformed lines and additive
    unknown fields around a genuine final DONE; another is a fork chain whose
    pinned session pauses BLOCKED before a forked continuation closes DONE. Both
    reconcile to done.
  threads: [260718155545z-demo]
  control: { paneAlive: true }
  seedRuns:
    - { id: run-mal, thread: 260718155545z-demo, skill: propose, harness: claude, classification: active, sessionKind: pinned, sessionId: s-mal, handle: mal-pane }
    - { id: run-fork, thread: 260718155545z-demo, skill: propose, harness: claude, classification: active, sessionKind: pinned, sessionId: s-fork, handle: fork-pane }
  transcripts:
    - harness: claude
      sessionId: s-mal
      content: |
        {"type":"user","sessionId":"s-mal","uuid":"u1","message":{"role":"user","content":"go"}}
        this line is not valid json and must be skipped
        {"type":"assistant","sessionId":"s-mal","uuid":"a1","parentUuid":"u1","costUSD":0.12,"antmayFutureField":{"unknown":true},"message":{"role":"assistant","content":[{"type":"text","text":"Done.\nOutcome: DONE — malformed lines skipped and additive fields tolerated"}]}}
        {"still":"unterminated
    - harness: claude
      sessionId: s-fork
      content: |
        {"type":"user","sessionId":"s-fork","uuid":"u1","message":{"role":"user","content":"/propose the thread"}}
        {"type":"assistant","sessionId":"s-fork","uuid":"a1","parentUuid":"u1","message":{"role":"assistant","content":[{"type":"text","text":"Pausing.\nOutcome: BLOCKED — this is not the final message"}]}}
        {"type":"user","sessionId":"s-fork-2","forkedFrom":"s-fork","uuid":"u2","message":{"role":"user","content":"continue"}}
        {"type":"assistant","sessionId":"s-fork-2","forkedFrom":"s-fork","uuid":"a2","parentUuid":"u2","message":{"role":"assistant","content":[{"type":"text","text":"Continued.\nOutcome: DONE — fork chain resolved to the final message"}]}}
  steps:
    - argv: [status]
      expect:
        exitCode: 0
        stdoutContains: ["[done]"]
        stdoutNotContains: ["[blocked]"]
  assertState:
    - registryRunCount: 2
    - run: { select: 0, classification: done, reasonContains: "malformed lines skipped and additive fields tolerated" }
    - run: { select: 1, classification: done, reasonContains: "fork chain resolved to the final message" }

- id: outcome-transient-evidence-stays-active-degraded
  covers: [ANTMAY-FR-0006.AC-0606]
  title: Unreadable transcript evidence leaves an unended run active with degraded health
  description: >-
    A seeded active Claude run whose pinned transcript file is absent has no
    reliable outcome and a live pane. Reconciliation keeps it active, reports the
    unreadable-evidence diagnostic on the diagnostic stream, and never
    terminalizes the transient failure.
  threads: [260718155545z-demo]
  control: { paneAlive: true }
  seedRuns:
    - id: run-transient
      thread: 260718155545z-demo
      skill: propose
      harness: claude
      classification: active
      sessionKind: pinned
      sessionId: s-missing
      handle: transient-pane
      worker: { state: healthy, heartbeatAgeMs: 1000 }
  steps:
    - argv: [status]
      expect:
        exitCode: 0
        stdoutContains: ["[active]"]
        stderrContains: ["is unreadable"]
  assertState:
    - registryRunCount: 1
    - run: { select: 0, classification: active }

- id: outcome-ended-without-outcome-is-unknown
  covers: [ANTMAY-FR-0006.AC-0606]
  title: A positively ended endpoint with no outcome yields terminal unknown
  description: >-
    A seeded active Claude run whose transcript reads cleanly with no closing
    outcome reconciles to terminal unknown once its endpoint is positively ended.
  threads: [260718155545z-demo]
  control: { paneAlive: true }
  seedRuns:
    - { id: run-ended, thread: 260718155545z-demo, skill: propose, harness: claude, classification: active, sessionKind: pinned, sessionId: s-open, handle: ended-pane }
  transcripts:
    - harness: claude
      sessionId: s-open
      content: |
        {"type":"user","sessionId":"s-open","uuid":"u1","message":{"role":"user","content":"begin the skill run"}}
        {"type":"assistant","sessionId":"s-open","uuid":"a1","parentUuid":"u1","message":{"role":"assistant","content":[{"type":"text","text":"Working on it; no closing outcome yet."}]}}
  steps:
    - argv: [status]
